<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📄 Smart Invoice Extractor</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header>📄 Smart Invoice Extractor</header>
<button id="themeToggle">🌙 Dark Mode</button>

<div id="uploadArea">
  <p>Drag & Drop your invoice image here<br>or click to select a file</p>
  <input type="file" id="fileInput" accept="image/*">
  <div id="fileName">No file selected</div>
</div>

<button id="extractBtn">Extract Table Data</button>
<div id="loading">⏳ Processing invoice...</div>

<h2>Extracted JSON Data</h2>
<pre id="result"></pre>
<button id="copyJsonBtn">📋 Copy JSON</button>

<h2>Table View</h2>
<table id="tableView">
<thead>
<tr>
<th>Description</th>
<th>Quantity</th>
<th>Unit Price</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
<tfoot>
<tr>
<td colspan="3" class="right">Subtotal</td>
<td id="subtotalCell">0</td>
</tr>
<tr>
<td colspan="3" class="right">Tax</td>
<td id="taxCell">0</td>
</tr>
<tr>
<td colspan="3" class="right">Shipping</td>
<td id="shippingCell">0</td>
</tr>
<tr>
<td colspan="3" class="right">Total</td>
<td id="totalCell">0</td>
</tr>
</tfoot>
</table>

<script src="./script.js"></script>
</body>
</html>
