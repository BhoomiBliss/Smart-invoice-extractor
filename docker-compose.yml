services:
  mongodb:
    image: mongo:latest
    container_name: invoice-platform-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=invoice_db

  redis:
    image: redis:alpine
    container_name: invoice-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
